name: ilm-bot

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bind loopback-only (như RabbitMQ management UI) để chạy `prisma migrate dev` từ máy dev;
    # core-api trong container vẫn nối qua hostname nội bộ `postgres:5432`.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitdata:/var/lib/rabbitmq
    # Management UI (port 15672) KHÔNG expose ra ngoài — truy cập qua SSH tunnel:
    #   ssh -L 15672:localhost:15672 user@vps  rồi mở http://localhost:15672
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  zalo-gateway:
    build: ../services/zalo-gateway
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  core-api:
    build: ../services/core-api
    restart: unless-stopped
    env_file: .env
    environment:
      # DATABASE_URL ghép từ POSTGRES_* — docker-compose nội suy ${...} ở file này,
      # KHÔNG nội suy được nếu đặt trực tiếp trong .env (xem ghi chú trong .env.example)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - media:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  grading-worker:
    build: ../services/grading-worker
    restart: unless-stopped
    env_file: .env
    environment:
      CORE_API_BASE_URL: http://core-api:3001
    volumes:
      - media:/data/media
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core-api:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - zalo-gateway
      - core-api

volumes:
  pgdata:
  redisdata:
  rabbitdata:
  caddydata:
  caddyconfig:
  media: # /data/media (mục 3.8) — core-api đọc/xóa, grading-worker ghi (M3)
